<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeXP">
<meta name="theme-color" content="#0c0c0f">
<title>LifeXP</title>
<script>
// Inline PWA manifest
const manifest = {
  name: "LifeXP",
  short_name: "LifeXP",
  description: "Прокачай свою жизнь",
  start_url: "./",
  display: "standalone",
  background_color: "#0c0c0f",
  theme_color: "#0c0c0f",
  orientation: "portrait-primary",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230c0c0f'/%3E%3Ctext x='256' y='340' font-size='280' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='900' fill='url(%23g)'%3EXP%3C/text%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%237c6bff'/%3E%3Cstop offset='100%25' stop-color='%236bffcc'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const url = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = url;
document.currentScript.after(link);
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--surface3:#222228;
  --border:#2a2a35;--border2:#333340;
  --accent:#7c6bff;--accent3:#6bffcc;
  --text:#f0f0f5;--text2:#8888aa;--text3:#55556a;
  --success:#6bffcc;--danger:#ff6b6b;
  --p-high:#ff6b6b;--p-mid:#ffe06b;--p-low:#444455;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,107,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(107,255,204,.04) 0%,transparent 70%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:32px 20px 100px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo{font-family:‘Syne’,sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;background:linear-gradient(135deg,var(–accent),var(–accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo span{font-weight:400;font-size:11px;display:block;letter-spacing:2px;margin-top:-3px;font-family:‘DM Sans’,sans-serif;-webkit-text-fill-color:var(–text3);background:none}

/* XP */
.xp-global{background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:22px 24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.xp-level{font-family:‘Syne’,sans-serif;font-weight:800;font-size:38px;color:var(–accent);min-width:60px;text-align:center;line-height:1}
.xp-level small{display:block;font-size:10px;font-weight:600;letter-spacing:2px;color:var(–text3);font-family:‘DM Sans’,sans-serif;margin-top:2px}
.xp-info{flex:1}
.xp-label{font-size:12px;color:var(–text2);margin-bottom:8px;display:flex;justify-content:space-between}
.xp-label strong{color:var(–text)}
.xp-bar-wrap{height:8px;background:var(–surface2);border-radius:99px;overflow:hidden;border:1px solid var(–border)}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent3));border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative}
.xp-bar-fill::after{content:’’;position:absolute;top:0;right:0;width:20px;height:100%;background:rgba(255,255,255,.3);filter:blur(4px)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(–surface);border:1px solid var(–border);border-radius:16px;padding:16px;text-align:center}
.stat-num{font-family:‘Syne’,sans-serif;font-weight:800;font-size:26px;background:linear-gradient(135deg,var(–accent),var(–accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(–text3);letter-spacing:.5px}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:‘Syne’,sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(–text3)}
.btn-add{display:flex;align-items:center;gap:6px;background:var(–surface2);border:1px solid var(–border);color:var(–text2);font-family:‘DM Sans’,sans-serif;font-size:13px;padding:8px 14px;border-radius:10px;cursor:pointer;transition:all .2s}
.btn-add:hover{border-color:var(–accent);color:var(–accent);background:rgba(124,107,255,.08)}

/* GOAL CARD */
.goal-card{background:var(–surface);border:1px solid var(–border);border-radius:20px;margin-bottom:14px;overflow:hidden;transition:border-color .25s;animation:slideIn .35s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.goal-card:hover{border-color:var(–border2)}
.goal-card.completed{border-color:rgba(107,255,204,.25)}
.goal-header{padding:18px 20px 14px;cursor:pointer;user-select:none}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.goal-name{font-family:‘Syne’,sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px;line-height:1.3;flex:1;transition:color .2s}
.goal-name.done{text-decoration:line-through;color:var(–text2)}
.goal-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
.icon-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(–text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px}
.icon-btn:hover{background:var(–surface2);color:var(–text)}
.icon-btn.danger:hover{color:var(–danger);background:rgba(255,107,107,.1)}
.badge-done{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:rgba(107,255,204,.12);color:var(–accent3);padding:3px 8px;border-radius:99px;border:1px solid rgba(107,255,204,.2);white-space:nowrap}
.goal-progress-row{display:flex;align-items:center;gap:10px}
.goal-bar-wrap{flex:1;height:5px;background:var(–surface2);border-radius:99px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:99px;transition:width .45s ease}
.goal-pct{font-family:‘Syne’,sans-serif;font-weight:700;font-size:12px;min-width:32px;text-align:right;transition:color .2s}
.chevron{color:var(–text3);font-size:11px;transition:transform .25s ease;margin-left:2px}
.chevron.open{transform:rotate(180deg)}

/* TASKS */
.goal-tasks{border-top:1px solid var(–border);padding:10px 14px 14px;display:none}
.goal-tasks.open{display:block}

/* TASK ROW */
.task-node{position:relative}
.task-row{display:flex;align-items:center;gap:7px;padding:5px 4px;border-radius:9px;transition:background .15s;cursor:default}
.task-row:hover{background:var(–surface2)}
.indent-spacer{flex-shrink:0;display:flex;align-items:stretch}
.indent-line{width:16px;display:flex;justify-content:center;flex-shrink:0}
.indent-line::before{content:’’;width:1px;background:var(–border2);margin:4px 0}
.subtask-toggle{width:16px;height:16px;border:none;background:transparent;color:var(–text3);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;transition:color .15s,background .15s,transform .2s ease;padding:0}
.subtask-toggle:hover{background:var(–surface3);color:var(–text)}
.subtask-toggle.rotated{transform:rotate(90deg)}

/* Checkbox smooth transition */
.task-check{width:17px;height:17px;border-radius:5px;border:2px solid var(–border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s ease, border-color .2s ease, transform .15s ease;font-size:9px}
.task-check:hover{border-color:var(–accent);transform:scale(1.1)}
.task-check.is-done{background:var(–success);border-color:var(–success);color:#0c0c0f}

.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s;position:relative}
.priority-dot:hover{transform:scale(1.5)}
.ph{background:var(–p-high);box-shadow:0 0 5px var(–p-high)}
.pm{background:var(–p-mid)}
.pl{background:var(–p-low)}

/* Task text smooth strike */
.task-text{flex:1;font-size:13.5px;color:var(–text);line-height:1.4;word-break:break-word;transition:color .2s ease,opacity .2s ease}
.task-text.is-done{color:var(–text3);text-decoration:line-through;opacity:.6}

.task-deadline{font-size:11px;color:var(–text3);white-space:nowrap;flex-shrink:0}
.task-deadline.overdue{color:var(–danger)}
.task-deadline.soon{color:var(–p-mid)}
.task-row-btns{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-row:hover .task-row-btns{opacity:1}

/* Children slide */
.children-wrap{overflow:hidden;transition:max-height .3s ease,opacity .25s ease;max-height:0;opacity:0}
.children-wrap.open{max-height:2000px;opacity:1}

/* SUBTASK INPUT */
.subtask-add-row{display:none;align-items:center;gap:7px;padding:4px 4px;margin-top:2px}
.subtask-add-row.visible{display:flex}
.task-input{flex:1;background:var(–surface2);border:1px solid var(–border);border-radius:9px;padding:6px 10px;font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(–text);outline:none;transition:border-color .2s}
.task-input::placeholder{color:var(–text3)}
.task-input:focus{border-color:var(–accent)}
.task-submit{width:30px;height:30px;background:var(–accent);border:none;border-radius:8px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.task-submit:hover{background:#9080ff;transform:scale(1.05)}

/* ROOT ADD */
.root-add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(–border)}

/* POPUP MENUS */
.pop-menu{position:fixed;z-index:9999;background:var(–surface);border:1px solid var(–border2);border-radius:12px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;min-width:140px}
.pop-menu.open{display:block}
.pm-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(–text2);transition:background .15s;white-space:nowrap}
.pm-opt:hover{background:var(–surface2);color:var(–text)}
.pm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dl-wrap{padding:4px 2px}
.dl-wrap label{font-size:11px;color:var(–text3);display:block;margin-bottom:6px;letter-spacing:.5px}
.dl-input{background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:6px 10px;font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(–text);outline:none;width:100%;transition:border-color .2s}
.dl-input:focus{border-color:var(–accent)}
.dl-btns{display:flex;gap:6px;margin-top:8px}
.dl-btn{flex:1;padding:5px 6px;border-radius:7px;border:1px solid var(–border);background:transparent;color:var(–text2);font-size:12px;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .15s}
.dl-btn:hover{background:var(–surface2);color:var(–text)}
.dl-btn.ok{background:var(–accent);border-color:var(–accent);color:#fff}
.dl-btn.ok:hover{background:#9080ff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(–surface);border:1px solid var(–border);border-radius:24px;padding:32px;width:100%;max-width:440px;transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:‘Syne’,sans-serif;font-weight:700;font-size:20px;margin-bottom:24px}
.modal-input{width:100%;background:var(–surface2);border:1px solid var(–border);border-radius:12px;padding:13px 15px;font-family:‘DM Sans’,sans-serif;font-size:15px;color:var(–text);outline:none;margin-bottom:12px;transition:border-color .2s}
.modal-input::placeholder{color:var(–text3)}
.modal-input:focus{border-color:var(–accent)}
.color-label{font-size:12px;color:var(–text2);margin-bottom:10px}
.color-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot:hover{transform:scale(1.15)}
.color-dot.selected{border-color:#fff;transform:scale(1.15)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;border-radius:12px;border:1px solid var(–border);background:transparent;color:var(–text2);font-family:‘DM Sans’,sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(–surface2);color:var(–text)}
.btn-confirm{padding:10px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(–accent),#9080ff);color:#fff;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-confirm:hover{opacity:.85;transform:translateY(-1px)}

/* TOASTS */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,var(–accent),var(–accent3));color:#0c0c0f;font-family:‘Syne’,sans-serif;font-weight:800;font-size:15px;padding:12px 28px;border-radius:99px;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;letter-spacing:.5px;box-shadow:0 8px 32px rgba(124,107,255,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.flash{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(107,255,204,.1) 0%,transparent 70%);pointer-events:none;z-index:200;opacity:0;animation:flash .5s ease forwards}
@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

/* ROOT TASK vs SUBTASK visual hierarchy */
.task-row.is-root{padding:7px 6px;border-radius:11px;background:var(–surface2);margin-bottom:3px;border:1px solid var(–border)}
.task-row.is-root:hover{background:var(–surface3);border-color:var(–border2)}
.task-row.is-root .task-text{font-size:14px;font-weight:500}

/* Task mini progress bar (shown only on root tasks with children) */
.task-mini-progress{display:flex;align-items:center;gap:6px;padding:3px 6px 6px calc(16px + 6px);margin-top:-2px;margin-bottom:2px}
.task-mini-bar-wrap{flex:1;height:3px;background:var(–border);border-radius:99px;overflow:hidden;max-width:80px}
.task-mini-bar-fill{height:100%;border-radius:99px;background:var(–accent3);transition:width .4s ease}
.task-mini-pct{font-size:10px;color:var(–text3);font-family:‘Syne’,sans-serif;font-weight:700;min-width:24px}

/* Inline rename input */
.rename-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(–accent);color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:13.5px;line-height:1.4;outline:none;padding:0 2px;min-width:0}
.rename-input.is-root-rename{font-size:14px;font-weight:500}

/* Goal rename input in header */
.goal-name-input{font-family:‘Syne’,sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px;background:transparent;border:none;border-bottom:1.5px solid var(–accent);color:var(–text);outline:none;flex:1;min-width:0;padding:0 2px;line-height:1.3}

/* COMPLETE BANNER */
.goal-complete-banner{background:rgba(107,255,204,.07);border-top:1px solid rgba(107,255,204,.15);padding:10px 20px;text-align:center;font-size:12px;color:var(–accent3);letter-spacing:1px;font-weight:600}

/* HABITS SECTION */
.habit-card{background:var(–surface);border:1px solid var(–border);border-radius:16px;margin-bottom:10px;display:flex;flex-direction:column;transition:border-color .2s;animation:slideIn .3s ease;position:relative;overflow:hidden}
.habit-card:hover{border-color:var(–border2)}
.habit-card.done-today{border-color:rgba(107,255,204,.3);background:rgba(107,255,204,.03)}
.habit-top-row{display:flex;align-items:center;gap:10px;padding:12px 14px;min-width:0}

.habit-check-btn{width:40px;height:40px;border-radius:12px;border:2px solid var(–border2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:18px;color:var(–text3)}
.habit-check-btn:hover{border-color:var(–accent3);color:var(–accent3)}
.habit-card.done-today .habit-check-btn{background:var(–accent3);border-color:var(–accent3);color:#0c0c0f}

.habit-info{flex:1;min-width:0;overflow:hidden}
.habit-name{font-size:14px;font-weight:500;color:var(–text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-card.done-today .habit-name{color:var(–text2)}
.habit-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.habit-days-label{font-size:11px;color:var(–text3)}
.habit-day-dot{display:inline-flex;width:18px;height:18px;border-radius:50%;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:var(–surface2);color:var(–text3);border:1px solid var(–border)}
.habit-day-dot.active{background:rgba(124,107,255,.2);color:var(–accent);border-color:rgba(124,107,255,.4)}
.habit-day-dot.today{border-color:var(–accent)}

.habit-streak{display:flex;align-items:center;gap:3px;flex-shrink:0}
.streak-num{font-family:‘Syne’,sans-serif;font-weight:800;font-size:18px;color:var(–text2);line-height:1}
.streak-num.hot{color:#ff9f6b}
.streak-fire{font-size:14px;line-height:1}
.streak-label{font-size:9px;color:var(–text3);letter-spacing:.5px;text-align:center}

/* Habit right side — just streak + expand */
.habit-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Context menu for habit actions */
.habit-ctx-menu{position:fixed;z-index:9999;background:var(–surface);border:1px solid var(–border2);border-radius:14px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;min-width:160px}
.habit-ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;color:var(–text2);transition:background .15s}
.ctx-item:hover{background:var(–surface2);color:var(–text)}
.ctx-item.danger{color:var(–danger)}
.ctx-item.danger:hover{background:rgba(255,107,107,.1)}

/* Drag handle */
.drag-handle{width:16px;height:20px;display:flex;align-items:center;justify-content:center;color:var(–text3);cursor:grab;flex-shrink:0;font-size:12px;opacity:.4;touch-action:none}
.habit-card.dragging{opacity:.3;border-style:dashed}

/* HABIT MODAL */
.days-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(–border);background:transparent;color:var(–text3);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:‘DM Sans’,sans-serif}
.day-btn:hover{border-color:var(–accent);color:var(–accent)}
.day-btn.sel{background:rgba(124,107,255,.2);border-color:var(–accent);color:var(–accent)}
.day-btn.all-sel{background:var(–accent);border-color:var(–accent);color:#fff}
.freq-label{font-size:12px;color:var(–text2);margin-bottom:8px}
.freq-row{display:flex;gap:8px;margin-bottom:16px}
.freq-opt{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(–border);background:transparent;color:var(–text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;font-family:‘DM Sans’,sans-serif}
.freq-opt:hover{border-color:var(–accent);color:var(–accent)}
.freq-opt.sel{background:rgba(124,107,255,.15);border-color:var(–accent);color:var(–accent)}

/* not-scheduled today */
.habit-card.not-today{opacity:.5}
.habit-card.not-today:hover{opacity:.8}

/* HEATMAP */
.habit-heatmap{padding:10px 14px 12px;border-top:1px solid var(–border);display:none}
.habit-heatmap.open{display:block}
.heatmap-months{display:flex;gap:2px;margin-bottom:4px;overflow:hidden}

window.onerror = function(msg, src, line, col, err) {
  alert('ERROR: ' + msg + '\nLine: ' + line + '\n' + (err?.stack||''));
  return false;
};
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='sine', vol=0.18) {
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}
function playTick(){ beep(900,.12,'sine',.15); }
function playLevelUp(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sine',.18),i*110)); }
function playGoalDone(){ [523,659,784,1047,1568].forEach((f,i)=>setTimeout(()=>beep(f,.28,'triangle',.14),i*90)); }

// ── Constants ──────────────────────────────────────────────────────
const COLORS = ['#7c6bff','#ff6b9d','#6bffcc','#ff9f6b','#ffe06b','#6bb5ff','#a8ff6b','#ff6b6b'];
let selColor = COLORS[0];

// ── State ──────────────────────────────────────────────────────────
let S = (() => { try { return JSON.parse(localStorage.getItem('lifexp_v2')) || {goals:[]}; } catch { return {goals:[]}; } })();
function save(){ localStorage.setItem('lifexp_v2', JSON.stringify(S)); }

// ── Helpers ────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function countTasks(tasks){
  let total=0, done=0;
  function walk(list){ for(const t of list){ total++; if(t.done) done++; if(t.ch?.length) walk(t.ch); } }
  walk(tasks); return {total,done};
}
function recalcXP(){
  let xp=0;
  for(const g of S.goals){ const {done}=countTasks(g.tasks); xp+=done*10; }
  xp+=(S.habitXP||0);
  return xp;
}
function getLevel(xp){
  let lvl=1, need=100, rem=xp;
  while(rem>=need){ rem-=need; lvl++; need=Math.floor(need*1.2); }
  return {lvl, current:rem, needed:need};
}

function findTask(list, id){
  for(const t of list){ if(t.id===id) return t; if(t.ch?.length){ const f=findTask(t.ch,id); if(f) return f; } }
  return null;
}
function removeTask(list, id){
  const i=list.findIndex(t=>t.id===id);
  if(i!==-1){ list.splice(i,1); return true; }
  for(const t of list){ if(t.ch?.length && removeTask(t.ch,id)) return true; }
  return false;
}
function newTask(text){ return {id:uid(), text, done:false, priority:'low', deadline:null, ch:[], open:true}; }

function deadlineLabel(d){
  if(!d) return '';
  const diff=Math.ceil((new Date(d)-new Date())/86400000);
  if(diff<0) return 'просрочено';
  if(diff===0) return 'сегодня';
  if(diff===1) return 'завтра';
  return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function deadlineCls(d){
  if(!d) return '';
  const diff=(new Date(d)-new Date())/86400000;
  if(diff<0) return 'overdue';
  if(diff<2) return 'soon';
  return '';
}

// ── Active popup management ────────────────────────────────────────
let activePopup = null;
function closePopups(){ if(activePopup){ activePopup.classList.remove('open'); activePopup=null; } }
document.addEventListener('click', e => {
  if(e.target.closest('.pop-menu')) return;

});

// ── Modal ──────────────────────────────────────────────────────────
const colorRow = document.getElementById('colorRow');
COLORS.forEach(c=>{
  const d=document.createElement('div');
  d.className='color-dot'+(c===selColor?' selected':'');
  d.style.background=c;
  d.onclick=()=>{ selColor=c; document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); };
  colorRow.appendChild(d);
});
function openModal(){ document.getElementById('modalOverlay').classList.add('open'); setTimeout(()=>document.getElementById('goalNameInput').focus(),100); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); document.getElementById('goalNameInput').value=''; }
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('goalNameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') createGoal(); });

function createGoal(){
  const name=document.getElementById('goalNameInput').value.trim();
  if(!name) return;
  S.goals.push({id:uid(), name, color:selColor, tasks:[], open:true});
  save(); render(); closeModal();
}
function deleteGoal(id){ if(!confirm('Удалить цель?')) return; S.goals=S.goals.filter(g=>g.id!==id); save(); render(); }
function toggleGoalOpen(id){ const g=S.goals.find(g=>g.id===id); if(g){ g.open=!g.open; save(); render(); } }

// ── Task ops ───────────────────────────────────────────────────────
function addRootTask(goalId){
  const inp=document.getElementById('inp_root_'+goalId);
  const text=inp.value.trim(); if(!text) return;
  S.goals.find(g=>g.id===goalId).tasks.push(newTask(text));
  inp.value=''; save(); render();
  setTimeout(()=>{ const el=document.getElementById('inp_root_'+goalId); if(el) el.focus(); },40);
}
function addChildTask(goalId, parentId){
  const inp=document.getElementById('inp_'+parentId);
  const text=inp.value.trim(); if(!text) return;
  const g=S.goals.find(g=>g.id===goalId);
  const p=findTask(g.tasks, parentId);
  if(!p) return;
  if(!p.ch) p.ch=[];
  p.ch.push(newTask(text));
  if(!p.open) p.open=true;
  inp.value=''; save(); render();
  setTimeout(()=>{ const el=document.getElementById('inp_'+parentId); if(el) el.focus(); },40);
}
function toggleTask(goalId, taskId){
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks, taskId); if(!t) return;
  const prevXP=recalcXP();
  const prevLvl=getLevel(prevXP).lvl;
  t.done=!t.done;
  if(t.done){ playTick(); showFlash(); }
  save();

  // Surgical DOM update — no full re-render
  const node=document.querySelector(`.task-node[data-id="${taskId}"]`);
  if(node){
    const chk=node.querySelector(':scope>.task-row .task-check');
    const txt=node.querySelector(':scope>.task-row .task-text');
    if(t.done){
      chk.classList.add('is-done'); chk.textContent='✓';
      txt.classList.add('is-done');
    } else {
      chk.classList.remove('is-done'); chk.textContent='';
      txt.classList.remove('is-done');
    }
  }

  // Update goal progress bar + pct smoothly
  const {total,done}=countTasks(g.tasks);
  const pct=total===0?0:Math.round(done/total*100);
  const card=document.querySelector(`.goal-card[data-gid="${goalId}"]`);
  if(card){
    const bar=card.querySelector('.goal-bar-fill');
    const pctEl=card.querySelector('.goal-pct');
    if(bar) bar.style.width=pct+'%';
    if(pctEl) pctEl.textContent=pct+'%';
    // completed state
    if(total>0&&done===total){
      card.classList.add('completed');
    } else {
      card.classList.remove('completed');
    }
  }

  // Update mini progress bars for all root tasks (lightweight)
  const gCard=document.querySelector(`.goal-card[data-gid="${goalId}"]`);
  if(gCard){
    g.tasks.forEach(rt=>{
      if(!rt.ch||!rt.ch.length) return;
      const {total,done}=countTasks(rt.ch);
      const pct=total===0?0:Math.round(done/total*100);
      const mini=document.getElementById('mini_'+rt.id);
      if(mini){
        const fill=mini.querySelector('.task-mini-bar-fill');
        const pctEl=mini.querySelector('.task-mini-pct');
        if(fill) fill.style.width=pct+'%';
        if(pctEl) pctEl.textContent=pct+'%';
      }
    });
  }

  // Update global stats
  updateStats();

  const newXP=recalcXP();
  const newLvl=getLevel(newXP).lvl;
  if(newLvl>prevLvl){ setTimeout(()=>{ playLevelUp(); showToast('🎮 УРОВЕНЬ '+newLvl+'!'); },100); }
  if(t.done && total>0 && done===total){ setTimeout(playGoalDone, 200); }
  updateXPBar();
}

function toggleTaskOpen(goalId, taskId){
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks, taskId); if(!t) return;
  t.open=!t.open; save();

  // Surgical: just toggle children-wrap visibility
  const node=document.querySelector(`.task-node[data-id="${taskId}"]`);
  if(node){
    const wrap=node.querySelector(':scope>.children-wrap');
    const btn=node.querySelector(':scope>.task-row .subtask-toggle');
    if(wrap){
      if(t.open){ wrap.classList.add('open'); }
      else { wrap.classList.remove('open'); }
    }
    if(btn) btn.textContent=t.open?'▾':'▸';
  }
}

function deleteTask(goalId, taskId){
  const g=S.goals.find(g=>g.id===goalId);
  removeTask(g.tasks, taskId);
  save(); render();
}
function updateXPBar(){
  const xp=recalcXP();
  const {lvl,current,needed}=getLevel(xp);
  document.getElementById('lvlNum').innerHTML=lvl+'<small>LVL</small>';
  document.getElementById('xpBar').style.width=Math.round(current/needed*100)+'%';
  document.getElementById('xpLabel').textContent=current+' / '+needed+' XP';
}

function updateStats(){
  let totalAll=0,doneAll=0;
  S.goals.forEach(g=>{ const c=countTasks(g.tasks); totalAll+=c.total; doneAll+=c.done; });
  document.getElementById('statGoals').textContent=S.goals.length;
  document.getElementById('statDone').textContent=doneAll;
  document.getElementById('statPct').textContent=(totalAll===0?0:Math.round(doneAll/totalAll*100))+'%';
}
function setPriority(goalId, taskId, p){
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks, taskId); if(!t) return;
  t.priority=p; closePopups(); save(); render();
}
function setDeadline(goalId, taskId){
  const inp=document.getElementById('dlinp_'+taskId);
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks, taskId); if(!t) return;
  t.deadline=inp.value||null; closePopups(); save(); render();
}
function clearDeadline(goalId, taskId){
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks, taskId); if(!t) return;
  t.deadline=null; closePopups(); save(); render();
}

// ── FX ─────────────────────────────────────────────────────────────
function showFlash(){ const f=document.createElement('div'); f.className='flash'; document.body.appendChild(f); setTimeout(()=>f.remove(),600); }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ── Show/hide subtask input row ────────────────────────────────────
function toggleSubInput(taskId){
  const row=document.getElementById('subrow_'+taskId);
  if(!row) return;
  const visible=row.classList.contains('visible');
  // hide all sub inputs
  document.querySelectorAll('.subtask-add-row.visible').forEach(r=>r.classList.remove('visible'));
  if(!visible){
    row.classList.add('visible');
    setTimeout(()=>{ const inp=document.getElementById('inp_'+taskId); if(inp) inp.focus(); },30);
  }
}

// ── Render task tree (recursive) ───────────────────────────────────
function countDirect(tasks){ // count only direct children done/total
  return { total: tasks.length, done: tasks.filter(t=>t.done).length };
}

function buildTaskTree(tasks, goalId, depth){
  const frag=document.createDocumentFragment();

  tasks.forEach(t=>{
    const priCls = t.priority==='high'?'ph':t.priority==='mid'?'pm':'pl';
    const dlLabel=deadlineLabel(t.deadline);
    const dlCls=deadlineCls(t.deadline);
    const hasKids=t.ch&&t.ch.length>0;
    const isRoot=depth===0;

    // count subtask progress for root tasks
    let subTotal=0,subDone=0;
    if(isRoot&&hasKids){ const c=countTasks(t.ch); subTotal=c.total; subDone=c.done; }
    const subPct=subTotal===0?0:Math.round(subDone/subTotal*100);

    const wrap=document.createElement('div');
    wrap.className='task-node';
    wrap.dataset.id=t.id;

    let indentHtml='';
    for(let i=0;i<depth;i++) indentHtml+='<div class="indent-line"></div>';

    const row=document.createElement('div');
    row.className='task-row'+(isRoot?' is-root':'');
    row.innerHTML=`
      ${indentHtml}
      <button class="subtask-toggle" onclick="event.stopPropagation();toggleTaskOpen('${goalId}','${t.id}')" title="">
        ${hasKids?(t.open?'▾':'▸'):'·'}
      </button>
      <div class="task-check${t.done?' is-done':''}" onclick="event.stopPropagation();toggleTask('${goalId}','${t.id}')">${t.done?'✓':''}</div>
      <div class="priority-dot ${priCls}" onclick="event.stopPropagation();openPrioMenu(event,'${goalId}','${t.id}')" title="Приоритет"></div>
      <div class="task-text${t.done?' is-done':''}" ondblclick="event.stopPropagation();startRenameTask('${goalId}','${t.id}')" title="Двойной клик — переименовать">${esc(t.text)}</div>
      ${dlLabel?`<span class="task-deadline ${dlCls}">${esc(dlLabel)}</span>`:''}
      <div class="task-row-btns">
        <button class="icon-btn" title="Срок" onclick="event.stopPropagation();openDlMenu(event,'${goalId}','${t.id}')">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
        </button>
        <button class="icon-btn" title="+ Подзадача" onclick="event.stopPropagation();toggleSubInput('${t.id}')">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        </button>
        <button class="icon-btn danger" title="Удалить" onclick="event.stopPropagation();deleteTask('${goalId}','${t.id}')">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
        </button>
      </div>
    `;

    // priority popup
    let prioMenu=document.getElementById('pm_'+t.id);
    if(!prioMenu){
      prioMenu=document.createElement('div');
      prioMenu.className='pop-menu'; prioMenu.id='pm_'+t.id;
      prioMenu.innerHTML=`
        <div class="pm-opt" onclick="setPriority('${goalId}','${t.id}','high')"><div class="pm-dot" style="background:var(--p-high)"></div>Высокий 🔴</div>
        <div class="pm-opt" onclick="setPriority('${goalId}','${t.id}','mid')"><div class="pm-dot" style="background:var(--p-mid)"></div>Средний 🟡</div>
        <div class="pm-opt" onclick="setPriority('${goalId}','${t.id}','low')"><div class="pm-dot" style="background:var(--p-low)"></div>Низкий ⚪</div>
      `;
      document.body.appendChild(prioMenu);
    }

    // deadline popup
    let dlMenu=document.getElementById('dm_'+t.id);
    if(!dlMenu){
      dlMenu=document.createElement('div');
      dlMenu.className='pop-menu'; dlMenu.id='dm_'+t.id;
      dlMenu.style.minWidth='190px';
      dlMenu.innerHTML=`
        <div class="dl-wrap">
          <label>Срок выполнения</label>
          <input class="dl-input" type="date" id="dlinp_${t.id}" value="${t.deadline||''}">
          <div class="dl-btns">
            <button class="dl-btn" onclick="clearDeadline('${goalId}','${t.id}')">Убрать</button>
            <button class="dl-btn ok" onclick="setDeadline('${goalId}','${t.id}')">Сохранить</button>
          </div>
        </div>
      `;
      document.body.appendChild(dlMenu);
    } else {
      const inp=document.getElementById('dlinp_'+t.id);
      if(inp) inp.value=t.deadline||'';
    }

    wrap.appendChild(row);

    // mini progress bar for root tasks with children
    if(isRoot&&hasKids){
      const mini=document.createElement('div');
      mini.className='task-mini-progress';
      mini.id='mini_'+t.id;
      mini.innerHTML=`<div class="task-mini-bar-wrap"><div class="task-mini-bar-fill" style="width:${subPct}%"></div></div><span class="task-mini-pct">${subPct}%</span>`;
      wrap.appendChild(mini);
    }

    // subtask add input
    const subRow=document.createElement('div');
    subRow.className='subtask-add-row'; subRow.id='subrow_'+t.id;
    subRow.style.paddingLeft=((depth+1)*16+30)+'px';
    subRow.innerHTML=`
      <input class="task-input" id="inp_${t.id}" placeholder="Новая подзадача..." maxlength="80"
        onkeydown="if(event.key==='Enter') addChildTask('${goalId}','${t.id}'); if(event.key==='Escape') toggleSubInput('${t.id}')">
      <button class="task-submit" onclick="addChildTask('${goalId}','${t.id}')">+</button>
    `;
    wrap.appendChild(subRow);

    // children in animated wrapper
    if(hasKids){
      const childWrap=document.createElement('div');
      childWrap.className='children-wrap'+(t.open?' open':'');
      childWrap.appendChild(buildTaskTree(t.ch, goalId, depth+1));
      wrap.appendChild(childWrap);
    }

    frag.appendChild(wrap);
  });

  return frag;
}

// Position popup near click, keep inside viewport
function positionPopup(menu, e){
  menu.style.left='0'; menu.style.top='0'; menu.style.right=''; menu.style.bottom='';
  menu.style.display='block'; // temp show to measure
  const mw=menu.offsetWidth, mh=menu.offsetHeight;
  menu.style.display='';
  const vw=window.innerWidth, vh=window.innerHeight;
  let x=e.clientX, y=e.clientY+16;
  if(x+mw>vw-8) x=vw-mw-8;
  if(y+mh>vh-8) y=e.clientY-mh-4;
  if(y<8) y=8;
  menu.style.left=x+'px';
  menu.style.top=y+'px';
}

window.openPrioMenu=function(e, goalId, taskId){
  e.stopPropagation();
  const m=document.getElementById('pm_'+taskId); if(!m) return;
  const wasOpen=m.classList.contains('open');
  closePopups();
  if(!wasOpen){ positionPopup(m,e); m.classList.add('open'); activePopup=m; }
};
window.openDlMenu=function(e, goalId, taskId){
  e.stopPropagation();
  const m=document.getElementById('dm_'+taskId); if(!m) return;
  const wasOpen=m.classList.contains('open');
  closePopups();
  if(!wasOpen){ positionPopup(m,e); m.classList.add('open'); activePopup=m; }
};

// ── Rename ──────────────────────────────────────────────────────────
function startRenameGoal(goalId){
  const card=document.querySelector(`.goal-card[data-gid="${goalId}"]`);
  if(!card) return;
  const nameEl=card.querySelector('.goal-name');
  if(!nameEl||nameEl.querySelector('input')) return;
  const current=nameEl.textContent.trim();
  const inp=document.createElement('input');
  inp.className='goal-name-input';
  inp.value=current; inp.maxLength=80;
  nameEl.textContent='';
  nameEl.appendChild(inp);
  inp.focus(); inp.select();
  function commit(){
    const val=inp.value.trim()||current;
    const g=S.goals.find(g=>g.id===goalId); if(g){ g.name=val; save(); }
    render();
  }
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } if(e.key==='Escape') render(); });
  inp.addEventListener('blur',commit);
  inp.addEventListener('click',e=>e.stopPropagation());
}

function startRenameTask(goalId, taskId){
  const node=document.querySelector(`.task-node[data-id="${taskId}"]`);
  if(!node) return;
  const textEl=node.querySelector(':scope>.task-row .task-text');
  if(!textEl||textEl.querySelector('input')) return;
  const g=S.goals.find(g=>g.id===goalId);
  const t=findTask(g.tasks,taskId); if(!t) return;
  const current=t.text;
  const isRoot=textEl.classList.contains('is-root')||node.querySelector(':scope>.task-row.is-root');
  const inp=document.createElement('input');
  inp.className='rename-input'+(isRoot?' is-root-rename':'');
  inp.value=current; inp.maxLength=80;
  textEl.textContent='';
  textEl.appendChild(inp);
  inp.focus(); inp.select();
  function commit(){
    const val=inp.value.trim()||current;
    t.text=val; save();
    textEl.textContent=val;
  }
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } if(e.key==='Escape'){ textEl.textContent=current; } });
  inp.addEventListener('blur',commit);
  inp.addEventListener('click',e=>e.stopPropagation());
}

// ── Main render ────────────────────────────────────────────────────
function render(){
  closePopups();
  // remove old body-level popups
  document.querySelectorAll('body>.pop-menu').forEach(m=>m.remove());

  const list=document.getElementById('goalsList');
  list.innerHTML='';

  if(!S.goals.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">Нет целей.<br>Создай первую — и начни прокачку.</div></div>`;
  }

  let totalAll=0, doneAll=0;

  S.goals.forEach(g=>{
    const {total,done}=countTasks(g.tasks);
    const pct=total===0?0:Math.round(done/total*100);
    const isComplete=total>0&&done===total;
    totalAll+=total; doneAll+=done;

    const card=document.createElement('div');
    card.className='goal-card'+(isComplete?' completed':'');
    card.dataset.gid=g.id;

    // header
    const hdr=document.createElement('div');
    hdr.className='goal-header';
    hdr.onclick=()=>toggleGoalOpen(g.id);
    hdr.innerHTML=`
      <div class="goal-top">
        <div class="goal-name${isComplete?' done':''}" ondblclick="event.stopPropagation();startRenameGoal('${g.id}')" title="Двойной клик — переименовать">${esc(g.name)}</div>
        <div class="goal-actions" onclick="event.stopPropagation()">
          ${isComplete?'<span class="badge-done">✓ Готово</span>':''}
          <button class="icon-btn" onclick="startRenameGoal('${g.id}')" title="Переименовать">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg>
          </button>
          <button class="icon-btn danger" onclick="deleteGoal('${g.id}')" title="Удалить цель">

        </div>
      </div>

function buildHeatmap(id){
  const h=S.habits.find(h=>h.id===id); if(!h) return;
  const card=document.querySelector(`.habit-card[data-hid="${id}"]`);
  const grid=card.querySelector('.heatmap-grid');
  const monthsRow=card.querySelector('.heatmap-months');
  if(!grid) return;
  grid.innerHTML=''; monthsRow.innerHTML='';

  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);
  const WEEKS=14;
  const MONTH_NAMES=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  // Start from Monday 14 weeks ago
  const startDate=new Date(today);
  startDate.setDate(startDate.getDate()-(WEEKS*7-1));
  const startDow=startDate.getDay();
  const offsetToMon=startDow===0?-6:1-startDow;
  startDate.setDate(startDate.getDate()+offsetToMon);

  // Build weeks
  let lastMonth=-1;
  const weekMonths=[]; // which month label to show above each week col

  for(let w=0;w<WEEKS;w++){
    const weekEl=document.createElement('div');
    weekEl.className='heatmap-week';
    let monthForThisWeek='';

    for(let d=0;d<7;d++){
      const cur=new Date(startDate);
      cur.setDate(cur.getDate()+w*7+d);
      const ds=cur.toISOString().slice(0,10);
      const dow=cur.getDay();
      const isFuture=cur>today;
      const isToday=ds===todayStr;
      const isScheduled=h.days.includes(dow);
      const isDone=!!h.log?.[ds];

      const cell=document.createElement('div');
      cell.className='heatmap-cell';
      if(!isScheduled) cell.className+=' not-scheduled';
      else if(isFuture) cell.className+=' future';
      else if(isDone) cell.className+=' done-full';
      if(isToday) cell.className+=' today';
      cell.title=ds+(isDone?' ✓':'');
      weekEl.appendChild(cell);

      // detect month change on day 1 of week
      if(d===0 && cur.getMonth()!==lastMonth){
        lastMonth=cur.getMonth();
        monthForThisWeek=MONTH_NAMES[cur.getMonth()];
      }
    }
    weekMonths.push(monthForThisWeek);
    grid.appendChild(weekEl);
  }

  // Month labels — one span per week column, same flex gap as grid
  monthsRow.style.cssText='display:flex;gap:2px;margin-bottom:4px';
  weekMonths.forEach(label=>{
    const lbl=document.createElement('div');
    lbl.style.cssText='width:11px;flex-shrink:0;font-size:9px;color:var(--text3);text-align:center;overflow:visible;white-space:nowrap';
    lbl.textContent=label;
    monthsRow.appendChild(lbl);
  });
}

function buildDetailStats(id){
  const h=S.habits.find(h=>h.id===id); if(!h) return;
  const card=document.querySelector(`.habit-card[data-hid="${id}"]`);
  const statsEl=card.querySelector('.detail-stats');
  const chartEl=card.querySelector('.chart-bars');
  if(!statsEl) return;

  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);

  // Total completions
  const totalDone=Object.keys(h.log||{}).filter(d=>h.log[d]).length;

  // Max streak
  let maxStreak=0,cur2=0;
  const allDates=[];
  const tmp=new Date(today);
  for(let i=364;i>=0;i--){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    if(isScheduledOn(h,ds)) allDates.push(ds);
  }
  allDates.forEach(ds=>{
    if(h.log?.[ds]){ cur2++; maxStreak=Math.max(maxStreak,cur2); }
    else { const d=new Date(ds); if(d<=today) cur2=0; }
  });

  // Completion rate (scheduled days only, past)
  const scheduledPast=allDates.filter(ds=>new Date(ds)<=today);
  const rate=scheduledPast.length===0?0:Math.round(totalDone/scheduledPast.length*100);

  statsEl.innerHTML=`
    <div class="detail-stat"><div class="detail-stat-num hot">${h.streak||0}</div><div class="detail-stat-label">Стрик</div></div>
    <div class="detail-stat"><div class="detail-stat-num">${maxStreak}</div><div class="detail-stat-label">Макс стрик</div></div>
    <div class="detail-stat"><div class="detail-stat-num accent">${totalDone}</div><div class="detail-stat-label">Всего</div></div>
    <div class="detail-stat"><div class="detail-stat-num">${rate}%</div><div class="detail-stat-label">Процент</div></div>
  `;

  // Weekly bars — last 8 weeks
  if(!chartEl) return;
  chartEl.innerHTML='';
  const DAY_SHORT2=['вс','пн','вт','ср','чт','пт','сб'];
  const weeks=[];
  for(let w=7;w>=0;w--){
    const weekStart=new Date(today);
    weekStart.setDate(weekStart.getDate()-today.getDay()+1-w*7);
    let count=0, scheduled=0;
    for(let d=0;d<7;d++){
      const day=new Date(weekStart); day.setDate(day.getDate()+d);
      if(day>today) continue;
      if(isScheduledOn(h, day.toISOString().slice(0,10))){
        scheduled++;
        if(h.log?.[day.toISOString().slice(0,10)]) count++;
      }
    }
    weeks.push({count,scheduled,isCurrent:w===0});
  }
  const maxCount=Math.max(...weeks.map(w=>w.scheduled),1);
  weeks.forEach((w,i)=>{
    const wrap=document.createElement('div');
    wrap.className='chart-bar-wrap';
    const bar=document.createElement('div');
    bar.className='chart-bar'+(w.isCurrent?' current':'');
    bar.style.height=Math.round((w.count/maxCount)*48)+'px';
    const lbl=document.createElement('div');
    lbl.className='chart-bar-label';
    lbl.textContent=w.isCurrent?'сейчас':(i===6?'пр. нед':'');
    wrap.appendChild(bar); wrap.appendChild(lbl);
    chartEl.appendChild(wrap);
  });
}

// Check if habit is scheduled on a given date string
function isScheduledOn(h, ds){
  if(h.days==='alt' || h.freq==='alt'){
    // "every other day" — use epoch days parity anchored to first log entry or creation
    const epoch=Math.floor(new Date(ds).getTime()/86400000);
    // find anchor: earliest log date or today
    const logDates=Object.keys(h.log||{}).sort();
    const anchorDs=logDates.length>0?logDates[0]:todayStr();
    const anchorEpoch=Math.floor(new Date(anchorDs).getTime()/86400000);
    return (epoch-anchorEpoch)%2===0;
  }
  if(Array.isArray(h.days)) return h.days.includes(new Date(ds).getDay());
  return true;
}

function calcStreak(h){
  let streak=0;
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<365;i++){
    const cur=new Date(today); cur.setDate(cur.getDate()-i);
    const ds=cur.toISOString().slice(0,10);
    if(!isScheduledOn(h,ds)) continue;
    if(h.log&&h.log[ds]){ streak++; }
    else if(i===0){ continue; }
    else { break; }
  }
  return streak;
}

function toggleHabit(id){
  if(!S.habits) return;
  const h=S.habits.find(h=>h.id===id); if(!h) return;
  const today=todayStr();
  if(!h.log) h.log={};
  const wasDone=!!h.log[today];
  if(wasDone){
    delete h.log[today];
    if(!S.habitXP) S.habitXP=0;
    S.habitXP=Math.max(0,S.habitXP-5);
  } else {
    h.log[today]=true;
    playTick(); showFlash();
    if(!S.habitXP) S.habitXP=0;
    const prevLvl=getLevel(recalcXP()).lvl;
    S.habitXP+=5;
    const newLvl=getLevel(recalcXP()).lvl;
    if(newLvl>prevLvl) setTimeout(()=>{ playLevelUp(); showToast('🎮 УРОВЕНЬ '+newLvl+'!'); },100);
  }
  h.streak=calcStreak(h);
  save(); renderHabits(); updateXPBar(); updateStats(); renderDashboard();
}

        </button>

      // Drag handle — declared first so touch listeners can reference it
      const handle=document.createElement('div');
      handle.className='drag-handle'; handle.innerHTML='⠿'; handle.title='Перетащить';
      topRow.appendChild(handle);

      // Touch drag via handle
      let touchDragId=null, touchClone=null, touchTargetCat=null;
      handle.addEventListener('touchstart',e=>{
        e.stopPropagation();
        touchDragId=h.id;
        card.classList.add('dragging');
        document.querySelectorAll('.drop-zone').forEach(z=>z.classList.add('vis'));
        // create ghost
        touchClone=card.cloneNode(true);
        touchClone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;z-index:999;width:${card.offsetWidth}px;left:${e.touches[0].clientX-20}px;top:${e.touches[0].clientY-20}px;`;
        document.body.appendChild(touchClone);
      },{passive:true});
      handle.addEventListener('touchmove',e=>{
        if(!touchDragId) return;
        const t=e.touches[0];
        if(touchClone){ touchClone.style.left=(t.clientX-20)+'px'; touchClone.style.top=(t.clientY-20)+'px'; }
        // detect drop zone under finger
        touchClone.style.display='none';
        const el=document.elementFromPoint(t.clientX,t.clientY);
        touchClone.style.display='';
        const zone=el?.closest('.drop-zone');
        document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('over'));

      },{passive:true});

        }
        touchDragId=null; touchTargetCat=null;

      // Month heatmap with nav
      const heatmap=document.createElement('div'); heatmap.className='habit-heatmap';
      heatmap.innerHTML=`<div class="month-hm-header"><button class="month-nav-btn" onclick="habitHmPrev('${h.id}')">‹</button><div class="month-hm-title"></div><button class="month-nav-btn" onclick="habitHmNext('${h.id}')">›</button></div><div class="month-grid-wrap"></div>`;
      card.appendChild(heatmap);

      catEl.appendChild(card);
    });
    list.appendChild(catEl);
  });

  const addCatBtn=document.createElement('button');
  addCatBtn.className='btn-add'; addCatBtn.style.marginTop='4px';
  addCatBtn.innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> Новая категория';
  addCatBtn.onclick=addCat;
  list.appendChild(addCatBtn);
  } catch(err){ console.error('renderHabits error:', err); }
}

// ── CATEGORY MANAGEMENT ────────────────────────────────────────────
let catModalMode=null, catModalOldName=null;
function openCatModal(mode, oldName=''){
  catModalMode=mode; catModalOldName=oldName;
  document.getElementById('catModalTitle').textContent=mode==='add'?'Новая категория':'Переименовать';
  document.getElementById('catModalInput').value=oldName;
  document.getElementById('catModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('catModalInput').focus(),100);
}
function closeCatModal(){ document.getElementById('catModalOverlay').classList.remove('open'); }
document.getElementById('catModalOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeCatModal(); });
document.getElementById('catModalInput').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmCatModal(); });
function confirmCatModal(){
  const name=document.getElementById('catModalInput').value.trim(); if(!name) return;
  if(!S.habitCats) S.habitCats=['Общее'];
  if(catModalMode==='add'){
    if(!S.habitCats.includes(name)) S.habitCats.push(name);
  } else {
    const i=S.habitCats.indexOf(catModalOldName);
    if(i!==-1) S.habitCats[i]=name;
    S.habits.forEach(h=>{ if(h.cat===catModalOldName) h.cat=name; });
  }
  save(); renderHabits(); closeCatModal();
}
function addCat(){ openCatModal('add'); }
function renameCat(oldName){ openCatModal('rename', oldName); }
function deleteCat(name){
  if(name==='Общее'){ showToast('Нельзя удалить "Общее"'); return; }
  if(!confirm(`Удалить "${name}"? Привычки перейдут в "Общее".`)) return;
  S.habitCats=S.habitCats.filter(c=>c!==name);
  S.habits.forEach(h=>{ if(h.cat===name) h.cat='Общее'; });
  if(!S.habitCats.includes('Общее')) S.habitCats.unshift('Общее');
  save(); renderHabits();
}

// ── HABIT CONTEXT MENU ─────────────────────────────────────────────
let ctxHabitId=null;
document.addEventListener('click',e=>{
  if(!e.target.closest('.habit-ctx-menu')) closeHabitCtx();
});
function closeHabitCtx(){ document.getElementById('habitCtxMenu').classList.remove('open'); ctxHabitId=null; }
function openHabitCtx(e, id){
  e.stopPropagation(); e.preventDefault();
  ctxHabitId=id;
  const menu=document.getElementById('habitCtxMenu');
  menu.classList.add('open');
  const x=Math.min(e.clientX, window.innerWidth-170);
  const y=Math.min(e.clientY+4, window.innerHeight-150);
  menu.style.left=x+'px'; menu.style.top=y+'px';
}
function ctxDoRename(){ if(!ctxHabitId) return; closeHabitCtx(); startRenameHabit(ctxHabitId); }
function ctxDoStats(){ if(!ctxHabitId) return; closeHabitCtx(); toggleHabitDetail(ctxHabitId); }
function ctxDoDelete(){ if(!ctxHabitId) return; closeHabitCtx(); deleteHabit(ctxHabitId); }

// ── MONTH HEATMAP NAV ───────────────────────────────────────────────
const habitHmOffset={};
function habitHmPrev(id){ habitHmOffset[id]=(habitHmOffset[id]||0)-1; rebuildHabitHm(id); }
function habitHmNext(id){ habitHmOffset[id]=Math.min(0,(habitHmOffset[id]||0)+1); rebuildHabitHm(id); }
function rebuildHabitHm(id){
  const card=document.querySelector(`.habit-card[data-hid="${id}"]`); if(!card) return;
  const heatmap=card.querySelector('.habit-heatmap'); if(!heatmap) return;
  if(heatmap.classList.contains('open')) buildHeatmap(id);
}

function buildHeatmap(id){
  const h=S.habits.find(h=>h.id===id); if(!h) return;
  const card=document.querySelector(`.habit-card[data-hid="${id}"]`);
  const heatmap=card.querySelector('.habit-heatmap'); if(!heatmap) return;
  const wrap=heatmap.querySelector('.month-grid-wrap'); if(!wrap) return;
  const titleEl=heatmap.querySelector('.month-hm-title'); if(!titleEl) return;
  wrap.innerHTML='';

  const MONTH_NAMES_FULL=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const DAY_LABELS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const offset=habitHmOffset[id]||0;
  const now=new Date(); now.setHours(0,0,0,0);
  const ref=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const year=ref.getFullYear(), month=ref.getMonth();
  titleEl.textContent=MONTH_NAMES_FULL[month]+' '+year;

  const todayStr2=now.toISOString().slice(0,10);
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay(); // 0=Sun
  const startOffset=firstDow===0?6:firstDow-1; // Mon=0

  const grid=document.createElement('div'); grid.className='month-grid';
  // Day labels
  DAY_LABELS.forEach(l=>{ const d=document.createElement('div'); d.className='month-day-lbl'; d.textContent=l; grid.appendChild(d); });
  // Empty cells before start
  for(let i=0;i<startOffset;i++){ const e=document.createElement('div'); e.className='mcell m-empty'; grid.appendChild(e); }
  // Days
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cur=new Date(year,month,d);
    const isFuture=cur>now;
    const isToday=ds===todayStr2;
    const isScheduled=isScheduledOn(h,ds);
    const isDone=!!h.log?.[ds];

    const cell=document.createElement('div');
    let cls='mcell';
    if(!isScheduled) cls+=' m-nosch';
    else if(isFuture) cls+=' m-future';
    else if(isDone) cls+=' m-done';
    if(isToday) cls+=' m-today';
    cell.className=cls;
    cell.textContent=d;
    cell.title=ds+(isDone?' ✓':'');
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
}

// ── MOVE DAY TASK ───────────────────────────────────────────────────
let moveTaskState=null;
document.addEventListener('click',e=>{
  if(!e.target.closest('.move-task-popup')&&!e.target.closest('.move-day-btn')){
    document.getElementById('moveTaskPopup').classList.remove('open');
  }
});

function openMoveTask(e,ds,id){
  e.stopPropagation();
  moveTaskState={ds,id};
  const popup=document.getElementById('moveTaskPopup');
  const daysEl=document.getElementById('moveTaskDays');
  daysEl.innerHTML='';
  const MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=-1;i<=6;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    const dStr=d.toISOString().slice(0,10);
    if(dStr===ds) continue;
    const row=document.createElement('div');
    row.className='move-popup-day'+(dStr===todayStr()?' cur':'');
    let label=dStr===todayStr()?'Сегодня':WEEKDAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS_SHORT[d.getMonth()];
    row.textContent=label;
    row.onclick=()=>{ moveDayTask(ds,id,dStr); popup.classList.remove('open'); };
    daysEl.appendChild(row);
  }
  // position popup
  const rect=e.target.getBoundingClientRect();
  popup.style.top=Math.min(rect.bottom+4,window.innerHeight-200)+'px';
  popup.style.left=Math.max(4,rect.left-160)+'px';
  popup.classList.add('open');
}

function moveDayTask(fromDs,id,toDs){
  if(!S.dayTasks) return;
  const tasks=S.dayTasks[fromDs]||[];
  const idx=tasks.findIndex(t=>t.id===id); if(idx===-1) return;
  const t=tasks.splice(idx,1)[0];
  if(!S.dayTasks[toDs]) S.dayTasks[toDs]=[];
  S.dayTasks[toDs].push(t);
  currentDayStr=toDs;
  save(); renderDayView();
}
function renderDashboard(){
  const el=document.getElementById('dashboard'); if(!el) return;
  el.innerHTML='';
  const MONTH_NAMES=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);

  // ── Row 1: summary numbers ──
  const grid1=document.createElement('div');
  grid1.className='dash-grid';

  // Total tasks done across all goals
  let totalDoneTasks=0,totalTasks=0;
  (S.goals||[]).forEach(g=>{ const c=countTasks(g.tasks); totalTasks+=c.total; totalDoneTasks+=c.done; });
  // Total habit completions
  let totalHabitDone=0;
  (S.habits||[]).forEach(h=>{ totalHabitDone+=Object.values(h.log||{}).filter(Boolean).length; });
  // Active streak (best current streak among habits)
  let bestStreak=0;
  (S.habits||[]).forEach(h=>{ if((h.streak||0)>bestStreak) bestStreak=h.streak||0; });

  const xp=recalcXP();
  const {lvl}=getLevel(xp);

  // Card: total actions
  const c1=document.createElement('div'); c1.className='dash-card';
  c1.innerHTML=`<div class="dash-card-title">Действий всего</div><div class="dash-big-num">${totalDoneTasks+totalHabitDone}</div><div class="dash-sub">задачи + привычки</div>`;
  grid1.appendChild(c1);

  // Card: best streak
  const c2=document.createElement('div'); c2.className='dash-card';
  c2.innerHTML=`<div class="dash-card-title">Лучший стрик</div><div class="dash-big-num">${bestStreak}${bestStreak>=3?' 🔥':''}</div><div class="dash-sub">дней подряд</div>`;
  grid1.appendChild(c2);

  // Card: goal completion ring
  const c3=document.createElement('div'); c3.className='dash-card';
  const goalPct=totalTasks===0?0:Math.round(totalDoneTasks/totalTasks*100);
  const r=34, circ=2*Math.PI*r;
  const dash=circ*(goalPct/100);
  c3.innerHTML=`<div class="dash-card-title">Цели</div>
    <div class="ring-container">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="7"/>
        <circle cx="40" cy="40" r="${r}" fill="none" stroke="url(#rg)" stroke-width="7"
          stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--accent)"/>
          <stop offset="100%" stop-color="var(--accent3)"/>
        </linearGradient></defs>
      </svg>
      <div class="ring-text">${goalPct}%</div>
    </div>
    <div class="dash-sub" style="text-align:center">${totalDoneTasks} из ${totalTasks} задач</div>`;
  grid1.appendChild(c3);

  // Card: habit completion rate today
  const habitsToday=(S.habits||[]).filter(h=>h.days.includes(today.getDay()));
  const habitsDoneToday=habitsToday.filter(h=>!!h.log?.[todayStr]).length;
  const c4=document.createElement('div'); c4.className='dash-card';
  c4.innerHTML=`<div class="dash-card-title">Привычки сегодня</div><div class="dash-big-num">${habitsDoneToday}/${habitsToday.length}</div><div class="dash-sub">${habitsToday.length===0?'нет на сегодня':habitsDoneToday===habitsToday.length&&habitsToday.length>0?'все выполнены ✓':'осталось '+(habitsToday.length-habitsDoneToday)}</div>`;
  grid1.appendChild(c4);

  el.appendChild(grid1);

  // ── Goals progress list ──
  if((S.goals||[]).length>0){
    const gc=document.createElement('div'); gc.className='dash-card full'; gc.style.marginBottom='12px';
    gc.innerHTML='<div class="dash-card-title">Прогресс по целям</div>';
    S.goals.forEach(g=>{
      const {total,done}=countTasks(g.tasks);
      const pct=total===0?0:Math.round(done/total*100);
      const row=document.createElement('div'); row.className='dash-goal-row';
      row.innerHTML=`
        <div class="dash-goal-name">${esc(g.name)}</div>
        <div class="dash-goal-bar-wrap"><div class="dash-goal-bar" style="width:${pct}%;background:${g.color}"></div></div>
        <div class="dash-goal-pct" style="color:${g.color}">${pct}%</div>`;
      gc.appendChild(row);
    });
    el.appendChild(gc);
  }

  // ── Global activity heatmap (26 weeks) ──
  const hmCard=document.createElement('div'); hmCard.className='dash-card full';
  hmCard.innerHTML='<div class="dash-card-title">Активность · 26 недель</div>';
  const hmWrap=document.createElement('div'); hmWrap.className='global-heatmap-wrap';
  const monthsRow=document.createElement('div'); monthsRow.className='global-heatmap-months';
  const gridEl=document.createElement('div'); gridEl.className='global-heatmap-grid';

  const WEEKS=26;
  const startDate=new Date(today);
  startDate.setDate(startDate.getDate()-(WEEKS*7-1));
  const startDow=startDate.getDay();
  const off=startDow===0?-6:1-startDow;
  startDate.setDate(startDate.getDate()+off);

  // Build activity map: date -> count of actions
  const activityMap={};
  // from tasks (use completion as "today" since we don't store dates — skip, mark task dates N/A)
  // from habits
  (S.habits||[]).forEach(h=>{
    Object.entries(h.log||{}).forEach(([ds,v])=>{ if(v){ activityMap[ds]=(activityMap[ds]||0)+1; } });
  });

  let lastMonth=-1;
  const weekMonths=[];

  for(let w=0;w<WEEKS;w++){
    const wEl=document.createElement('div'); wEl.className='global-heatmap-week';
    let monthLabel='';
    for(let d=0;d<7;d++){
      const cur=new Date(startDate); cur.setDate(cur.getDate()+w*7+d);
      const ds=cur.toISOString().slice(0,10);
      const isFuture=cur>today;
      const isToday=ds===todayStr;
      const count=activityMap[ds]||0;

      const cell=document.createElement('div'); cell.className='ghm-cell';
      if(!isFuture&&count>0){
        const lvlC=count>=4?'a4':count===3?'a3':count===2?'a2':'a1';
        cell.classList.add(lvlC);
      }
      if(isToday) cell.classList.add('tc');
      cell.title=ds+(count>0?` · ${count} действий`:'');
      wEl.appendChild(cell);

      if(d===0&&cur.getMonth()!==lastMonth&&!isFuture){
        lastMonth=cur.getMonth();
        monthLabel=MONTH_NAMES[cur.getMonth()];
      }
    }
    weekMonths.push(monthLabel);
    gridEl.appendChild(wEl);
  }

  // month labels
  weekMonths.forEach(label=>{
    const lbl=document.createElement('div');
    lbl.style.cssText='width:10px;flex-shrink:0;font-size:9px;color:var(--text3);text-align:center;overflow:visible;white-space:nowrap';
    lbl.textContent=label;
    monthsRow.appendChild(lbl);
  });

  hmWrap.appendChild(monthsRow);
  hmWrap.appendChild(gridEl);
  hmCard.appendChild(hmWrap);
  el.appendChild(hmCard);
}

// ── TABS ───────────────────────────────────────────────────────────
const TABS=['day','goals','habits','dash'];
function switchTab(name){
  TABS.forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    document.getElementById('nav-'+t).classList.toggle('active',t===name);
  });
  if(name==='habits') renderHabits();
  if(name==='dash') renderDashboard();
  if(name==='day') renderDayView();
}

// ── DAY PLANNER ────────────────────────────────────────────────────
const WEEKDAYS=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS_RU=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

let currentDayStr=todayStr();

function goToday(){ currentDayStr=todayStr(); renderDayView(); }

function dayLabel(ds){
  const t=todayStr();
  const tom=new Date(); tom.setDate(tom.getDate()+1);
  const tomStr=tom.toISOString().slice(0,10);
  if(ds===t) return 'Сегодня';
  if(ds===tomStr) return 'Завтра';
  const d=new Date(ds);
  return WEEKDAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS_RU[d.getMonth()];
}

function getWeekDates(){
  // show 7 days: 3 before today, today, 3 after
  const today=new Date(); today.setHours(0,0,0,0);
  const dates=[];
  for(let i=-3;i<=6;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function renderWeekStrip(){
  const strip=document.getElementById('weekStrip'); if(!strip) return;
  strip.innerHTML='';
  const today=todayStr();
  const dates=getWeekDates();
  dates.forEach(ds=>{
    const d=new Date(ds);
    const btn=document.createElement('button');
    btn.className='week-day-btn'+(ds===currentDayStr?' active':'')+(ds===today?' is-today':'');
    const tasks=(S.dayTasks||{})[ds]||[];
    if(tasks.length>0) btn.classList.add('has-tasks');
    btn.innerHTML=`<div class="wday-label">${WEEKDAYS[d.getDay()]}</div><div class="wday-num">${d.getDate()}</div><div class="wday-dot"></div>`;
    btn.onclick=()=>{ currentDayStr=ds; renderDayView(); };
    strip.appendChild(btn);
  });
  // scroll active into view
  setTimeout(()=>{
    const active=strip.querySelector('.active');
    if(active) active.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  },50);
}

function renderDayView(){
  renderWeekStrip();
  // update date label
  const titleEl=document.querySelector('#tab-day .section-title');
  if(titleEl) titleEl.textContent=dayLabel(currentDayStr);

  const list=document.getElementById('dayTasksList'); if(!list) return;
  list.innerHTML='';
  if(!S.dayTasks) S.dayTasks={};
  const tasks=S.dayTasks[currentDayStr]||[];

  if(tasks.length===0){
    list.innerHTML=`<div class="empty" style="padding:32px 20px"><div class="empty-icon" style="font-size:36px">📋</div><div class="empty-text">Нет задач на этот день.<br>Добавь первую.</div></div>`;
  } else {
    tasks.forEach(t=>{
      const item=document.createElement('div');
      item.className='day-task-item'+(t.done?' done':'');
      item.innerHTML=`
        <div class="day-task-check${t.done?' checked':''}" onclick="toggleDayTask('${currentDayStr}','${t.id}')">${t.done?'✓':''}</div>
        <div class="day-task-text" ondblclick="renameDayTask('${currentDayStr}','${t.id}',this)">${esc(t.text)}</div>
        <button class="icon-btn move-day-btn day-task-del" title="Перенести" onclick="openMoveTask(event,'${currentDayStr}','${t.id}')">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8h12M10 4l4 4-4 4"/></svg>
        </button>
        <button class="icon-btn danger day-task-del" onclick="deleteDayTask('${currentDayStr}','${t.id}')">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
        </button>`;
      list.appendChild(item);
    });
  }

  // progress bar
  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length===0?0:Math.round(done/tasks.length*100);
  const bar=document.getElementById('dayProgressBar');
  const lbl=document.getElementById('dayProgressLabel');
  if(bar) bar.style.width=pct+'%';
  if(lbl) lbl.textContent=tasks.length===0?'':done+' / '+tasks.length;
}

function addDayTask(){
  const inp=document.getElementById('dayTaskInput');
  const text=inp.value.trim(); if(!text) return;
  if(!S.dayTasks) S.dayTasks={};
  if(!S.dayTasks[currentDayStr]) S.dayTasks[currentDayStr]=[];
  S.dayTasks[currentDayStr].push({id:uid(),text,done:false});
  inp.value=''; save(); renderDayView();
  setTimeout(()=>document.getElementById('dayTaskInput').focus(),40);
}

function toggleDayTask(ds,id){
  const t=(S.dayTasks[ds]||[]).find(t=>t.id===id); if(!t) return;
  const wasDone=t.done;
  t.done=!t.done;
  if(!wasDone){ playTick(); showFlash();
    const prevLvl=getLevel(recalcXP()).lvl;
    if(!S.habitXP) S.habitXP=0;
    S.habitXP+=3;
    const newLvl=getLevel(recalcXP()).lvl;
    if(newLvl>prevLvl) setTimeout(()=>{ playLevelUp(); showToast('🎮 УРОВЕНЬ '+newLvl+'!'); },100);
  } else {
    S.habitXP=Math.max(0,(S.habitXP||0)-3);
  }
  save(); renderDayView(); updateXPBar(); updateStats();
}

function deleteDayTask(ds,id){
  if(!S.dayTasks[ds]) return;
  const t=S.dayTasks[ds].find(t=>t.id===id);
  if(t&&t.done) S.habitXP=Math.max(0,(S.habitXP||0)-3);
  S.dayTasks[ds]=S.dayTasks[ds].filter(t=>t.id!==id);
  save(); renderDayView(); updateXPBar();
}

function renameDayTask(ds,id,el){
  const t=(S.dayTasks[ds]||[]).find(t=>t.id===id); if(!t) return;
  const cur=t.text;
  const inp=document.createElement('input');
  inp.className='task-input'; inp.value=cur; inp.maxLength=100;
  inp.style.cssText='height:20px;padding:0 4px;font-size:14px;';
  el.textContent=''; el.appendChild(inp);
  inp.focus(); inp.select();
  function commit(){ const v=inp.value.trim()||cur; t.text=v; save(); renderDayView(); }
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape') renderDayView(); });
  inp.addEventListener('blur',commit);
  inp.addEventListener('click',e=>e.stopPropagation());
}

render();
renderDayView();
renderDashboard();

</script>
